<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выберите дом</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.booking-app{
    max-width:420px;
    margin:auto;
    padding:16px;
}

h1{
    font-size:28px;
    margin:10px 0 20px;
}

.house-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:#fff;
    padding:12px;
    border-radius:18px;
    margin-bottom:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.2s;
}

.house-card:active{
    transform:scale(.98);
}

.house-photo{
    width:110px;
    height:90px;
    object-fit:cover;
    border-radius:12px;
    flex-shrink:0;
}

.house-info{
    flex:1;
}

.house-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:8px;
}

.house-address{
    color:#777;
    font-size:14px;
    margin-bottom:10px;
}

.house-price{
    font-size:17px;
    font-weight:600;
}

.house-arrow{
    font-size:30px;
    color:#bbb;
}

</style>

</head>

<body>

<div class="booking-app">

<h1>Выберите дом 🏡</h1>

<div class="house-card" onclick="openHouse(1)">
    <img src="images/house1.jpg" class="house-photo">

    <div class="house-info">
        <div class="house-title">Квартира-студия</div>
        <div class="house-address">📍 Краснодарский край, Сочи</div>
        <div class="house-price">от 19 000 ₽ / ночь</div>
    </div>

    <div class="house-arrow">›</div>
</div>

<div class="house-card" onclick="openHouse(2)">
    <img src="images/house2.jpg" class="house-photo">

    <div class="house-info">
        <div class="house-title">Дом с бассейном</div>
        <div class="house-address">📍 Московская область</div>
        <div class="house-price">от 16 500 ₽ / ночь</div>
    </div>

    <div class="house-arrow">›</div>
</div>

<div class="house-card" onclick="openHouse(3)">
    <img src="images/house3.jpg" class="house-photo">

    <div class="house-info">
        <div class="house-title">Коттедж с бассейном</div>
        <div class="house-address">📍 Ленинградская область</div>
        <div class="house-price">от 22 000 ₽ / ночь</div>
    </div>

    <div class="house-arrow">›</div>
</div>

</div>

<script>
function openHouse(id){
    window.location.href = "house" + id + ".html";
}
</script>

</body>
</html>
