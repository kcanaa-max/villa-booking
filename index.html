<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выберите жилье</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.booking-app{
    max-width:420px;
    margin:auto;
    padding:16px;
}

h1{
    font-size:28px;
    margin:10px 0 20px;
}

.house-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.2s;
}

.house-card:active{
    transform:scale(.98);
}

.house-photo{
    width:100%;
    height:180px;
    object-fit:cover;
    display:block;
}

.house-info{
    flex:1;
    padding:16px;
}

.house-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:8px;
}

.house-address{
    color:#777;
    font-size:14px;
    margin-bottom:10px;
}

.house-price{
    font-size:17px;
    font-weight:600;
}
    .house-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
}

.house-guests {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #777;
    font-size: 15px;
    white-space: nowrap;
}

.house-guests svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: #999;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
}

</style>

</head>

<body>

<div class="booking-app">

<h1>Выберите жильё 🏡</h1>

<div class="house-card" onclick="openHouse(1)">
    <img src="images/house1.jpg" class="house-photo">

    <div class="house-info">
        <div class="house-title">Квартира-студия</div>
        <div class="house-address">📍 Краснодарский край, г. Сочи, с. Эстосадок</div>
        <div class="house-bottom">
    <div class="house-price">от 4 000 ₽ / ночь</div>

    <div class="house-guests">
        <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        до 4 гостей
    </div>
</div>
    </div>

</div>

<div class="house-card" onclick="openHouse(2)">
    <img src="images/house2.jpg" class="house-photo">

    <div class="house-info">
        <div class="house-title">Дом с бассейном</div>
        <div class="house-address">📍 Краснодарский край, Сочи</div>
        <div class="house-bottom">
    <div class="house-price">от 15 000 ₽ / ночь</div>

    <div class="house-guests">
        <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        до 8 гостей
    </div>
</div>
    </div>

</div>

<div class="house-card" onclick="openHouse(3)">
    <img src="images/house3.jpg" class="house-photo">

    <div class="house-info">
        <div class="house-title">Коттедж с бассейном</div>
        <div class="house-address">📍 Ленинградская область, Ломоносовский р-н</div>
       <div class="house-bottom">
    <div class="house-price">от 25 000 ₽ / ночь</div>

    <div class="house-guests">
        <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        до 8 гостей
    </div>
</div>
    </div>

</div>

</div>

<script>
function openHouse(id){
    window.location.href = "house" + id + ".html";
}
</script>

</body>
</html>
