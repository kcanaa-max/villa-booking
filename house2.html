.flatpickr-day.flatpickr-disabled,

  /* Начало диапазона */

  /* Полностью скрыть даты соседних месяцев */

}
  /* Выбранные даты */
.flatpickr-day.selected,
.flatpickr-day.startRange,
.flatpickr-day.endRange {

}

/* Полоса между датами */
.flatpickr-day.inRange {

}

/* Чтобы края полосы были ровными */
.flatpickr-day.startRange {
    border-top-right-radius: 0 !important;
    border-bottom-right-radius: 0 !important;
}

.flatpickr-day.endRange {

<div class="booking-app">
<button class="back-button" onclick="window.location.href='index.html'">← Назад</button>
  <h1>Бронирование дома 🌲</h1>

  <div class="booking-card">
    <input id="calendarInput" type="text">
    <div class="booking-info">Выбери даты заезда и выезда</div>
    <div class="booking-dates" id="selectedDates">Выбери даты</div>
    <div class="booking-warning" id="warningText"></div>
  </div>

  <div class="booking-card">
    <label class="booking-option">
      <input type="checkbox" id="banya">
      <span>Баня +6 000 ₽</span>
    </label>
    <label class="booking-option" style="margin-top:10px;">
      <input type="checkbox" id="kupel">
      <span>Чан +4 000 ₽</span>
    </label>
  </div>

  <div class="booking-card">
    <div style="font-size:16px; margin-bottom:10px;">Количество гостей</div>
    <div class="guests-select-wrap">

    <svg class="guests-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
     <select id="guests" class="booking-input guests-select">
      <option value="1">1 гость</option>
      <option value="2">2 гостя</option>
      <option value="3">3 гостя</option>
      <option value="4" selected>4 гостя</option>
      <option value="5">5 гостей</option>
      <option value="6">6 гостей</option>
      <option value="7">7 гостей</option>
      <option value="8">8 гостей</option>
    </select>
    </div>
    <div class="booking-info">
      Базовая цена указана за 4 гостей.  
      Доплата начиная с 5-го гостя — 2 000 ₽ в сутки за человека.
    </div>
  </div>

  <div class="booking-card">
  <div class="booking-price" id="price">Стоимость: —</div>
  <div class="booking-info" id="priceDetails"></div>
  </div>

  <div class="booking-card">
    <input id="name" class="booking-input" type="text" placeholder="Ваше имя">
    <input id="comment" class="booking-input" type="text" placeholder="Комментарий (поздний выезд и т.д.)">
  </div>

  <div style="padding: 0 16px 20px;">
    <button class="booking-btn" id="bookBtn">Оставить заявку</button>
  </div>
</div>

<script>
window.addEventListener("load", function () {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }
  const TELEGRAM_USERNAME = "lena_k861";
  const CALENDAR_ID = "v8b24m3a9dumjkl5bdmf65ua9ao55a61@import.calendar.google.com";
  const API_KEY = "AIzaSyAYMSnK3P0ljVrGMNCnqpmDEn6qSRw6B1M";

  const minNights = 2;
  const weekdayPrice = 15000;
  const weekendPrice = 17000;
  const extraGuestPrice = 2000;
  const banyaPrice = 6000;
  const kupelPrice = 4000;
  const discounts = [
  { nights: 3, percent: 5 },
  { nights: 5, percent: 10 },
  { nights: 6, percent: 15 }
];
  const specialPrices = {
  "2026-12-31": { price: 60000, label: "Новогодний тариф 🎄" },
  "2027-01-01": { price: 60000, label: "Новогодний тариф 🎄" },
  "2027-03-08": { price: 19000, label: "Праздничный тариф 🌸" },
  "2027-02-14": { price: 19000, label: "праздничный тариф 🌸" },
  "2027-02-23": { price: 19000, label: "праздничный тариф 🌸" },
  "2026-06-13": { price: 18000 }
};
  function getDiscountPercent(nights) {
  let percent = 0;

  discounts.forEach(d => {
    if (nights >= d.nights) {
      percent = d.percent;
    }
  });

  return percent;
}
  function getNightPrice(date) {
  const key = toYMD(date);

  // Сначала проверяем специальную цену на конкретную дату
  if (specialPrices[key]) {
    return specialPrices[key].price;
  }

  const day = date.getDay();

  // Пятница и суббота — цена выходного дня
  if (day === 5 || day === 6) {
    return weekendPrice;
  }

  // Остальные дни — цена буднего дня
  return weekdayPrice;
}

  function getPriceDetails() {
  if (!checkin || !checkout) return "";

  const details = [];
  let current = new Date(
    checkin.getFullYear(),
    checkin.getMonth(),
    checkin.getDate(),
    12, 0, 0
  );

  while (current < checkout) {
    const key = toYMD(current);
   if (specialPrices[key] && specialPrices[key].label) {
  details.push(`${formatDate(current)} — ${specialPrices[key].label}`);
}
    current.setDate(current.getDate() + 1);
  }

  return details.join("\n");
}

  const selectedDatesEl = document.getElementById("selectedDates");
  const warningEl = document.getElementById("warningText");
  const priceEl = document.getElementById("price");
  const priceDetailsEl = document.getElementById("priceDetails");
  const banyaEl = document.getElementById("banya");
  const kupelEl = document.getElementById("kupel");
  const guestsEl = document.getElementById("guests");
  const bookBtn = document.getElementById("bookBtn");
  const nameEl = document.getElementById("name");
  const commentEl = document.getElementById("comment");

  let fp = null;
  let checkin = null;
  let checkout = null;
  let selectedNights = 0;

  function parseLocalDate(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    return new Date(y, m - 1, d, 12, 0, 0);
  }

  function toYMD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function formatDate(date) {
    const d = String(date.getDate()).padStart(2, "0");
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const y = date.getFullYear();
    return `${d}.${m}.${y}`;
  }

  function expandDates(startStr, endStr) {
    const dates = [];
    let current = parseLocalDate(startStr);
    const end = parseLocalDate(endStr);

    while (current < end) {
      dates.push(toYMD(current));
      current.setDate(current.getDate() + 1);
    }
    return dates;
  }

  function getTotal() {
  const guests = Number(guestsEl.value || 2);
  const extraGuests = Math.max(0, guests - 4);

  let total = 0;

  let current = new Date(
    checkin.getFullYear(),
    checkin.getMonth(),
    checkin.getDate(),
    12, 0, 0
  );

  while (current < checkout) {
    total += getNightPrice(current);

    // доплата за гостей
    total += extraGuests * extraGuestPrice;

    current.setDate(current.getDate() + 1);
  }

  // скидка
  const discountPercent = getDiscountPercent(selectedNights);
  if (discountPercent > 0) {
    total = total * (1 - discountPercent / 100);
  }

  // баня
  if (banyaEl.checked) total += banyaPrice;
  if (kupelEl.checked) total += kupelPrice;

  return Math.round(total);
}

  function resetPrice() {
  priceEl.innerText = "Стоимость: —";
  priceDetailsEl.innerText = "";
}

  function updateBookingState() {
    if (!checkin || !checkout) {
      selectedNights = 0;
      resetPrice();
      warningEl.innerText = "";
      bookBtn.disabled = false;
      return;
    }

    selectedNights = Math.round((checkout.getTime() - checkin.getTime()) / 86400000);

    if (selectedNights < minNights) {
      resetPrice();
      warningEl.innerText = "Минимальный срок бронирования — 2 ночи.";
      bookBtn.disabled = true;
      return;
    }

    priceEl.innerText = "Стоимость: " + getTotal().toLocaleString("ru-RU") + " ₽";
   let detailsText = getPriceDetails();

const discountPercent = getDiscountPercent(selectedNights);
if (discountPercent > 0) {
  detailsText += (detailsText ? "\n" : "") +
    `Скидка ${discountPercent}% за ${selectedNights} ночи ✨`;
}

priceDetailsEl.innerText = detailsText;
    warningEl.innerText = "";
    bookBtn.disabled = false;
  }

  function initCalendar(disabledDates) {
    if (typeof flatpickr === "undefined") {
      selectedDatesEl.innerText = "Календарь не загрузился";
      return;
    }

    if (fp) fp.destroy();

    fp = flatpickr("#calendarInput", {
      mode: "range",
      inline: true,
      minDate: "today",
      dateFormat: "Y-m-d",
      disable: disabledDates || [],
      locale: flatpickr.l10ns.ru,
      onDayCreate: function(dObj, dStr, fp, dayElem) {

    if (
        dayElem.classList.contains("prevMonthDay") ||
        dayElem.classList.contains("nextMonthDay")
    ) return;

    if (dayElem.classList.contains("flatpickr-disabled")) return;

    const price = getNightPrice(dayElem.dateObj);

    const priceDiv = document.createElement("div");
priceDiv.className = "day-price";
priceDiv.innerText =
    (price % 1000 === 0)
        ? (price / 1000) + " тыс."
        : (price / 1000).toFixed(1).replace(".", ",") + " тыс.";

dayElem.appendChild(priceDiv);

},
      onChange(selectedDates) {
        warningEl.innerText = "";

        if (selectedDates.length === 0) {
          checkin = null;
          checkout = null;
          selectedDatesEl.innerText = "Выбери даты";
          updateBookingState();
          return;
        }

        if (selectedDates.length === 1) {
          checkin = new Date(
            selectedDates[0].getFullYear(),
            selectedDates[0].getMonth(),
            selectedDates[0].getDate(),
            12, 0, 0
          );
          checkout = null;
          selectedDatesEl.innerText =
            "Заезд: " + formatDate(checkin) + "\nТеперь выбери дату выезда";
          resetPrice();
          bookBtn.disabled = false;
          return;
        }

        if (selectedDates.length === 2) {
          checkin = new Date(
            selectedDates[0].getFullYear(),
            selectedDates[0].getMonth(),
            selectedDates[0].getDate(),
            12, 0, 0
          );
          checkout = new Date(
            selectedDates[1].getFullYear(),
            selectedDates[1].getMonth(),
            selectedDates[1].getDate(),
            12, 0, 0
          );

          selectedDatesEl.innerText =
            "Заезд: " + formatDate(checkin) + "\nВыезд: " + formatDate(checkout);

          updateBookingState();
        }
      }
    });
  }

async function loadBusyDates() {
    const now = new Date();
    const timeMin = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const timeMax = new Date(now.getFullYear(), now.getMonth() + 12, 1).toISOString();

    const url =
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events` +
      `?key=${API_KEY}` +
      `&singleEvents=true` +
      `&orderBy=startTime` +
      `&timeMin=${encodeURIComponent(timeMin)}` +
      `&timeMax=${encodeURIComponent(timeMax)}`;

    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error?.message || "Ошибка загрузки календаря");
    }

    const busy = [];

    (data.items || []).forEach(event => {
      if (event.start?.date && event.end?.date) {
       busy.push(...expandDates(event.start.date, event.end.date));
      } else if (event.start?.dateTime && event.end?.dateTime) {
        const startDate = event.start.dateTime.slice(0, 10);
        const endDate = event.end.dateTime.slice(0, 10);

        const start = parseLocalDate(startDate);
        const end = parseLocalDate(endDate);

        if (toYMD(start) === toYMD(end)) {
          busy.push(toYMD(start));
        } else {
          busy.push(...expandDates(startDate, toYMD(end)));
        }
      }
    });

  console.log("GOOGLE EVENTS:", data.items);
console.log("BUSY DATES:", busy);
    return [...new Set(busy)];
  }

flatpickr.l10ns.ru.firstDayOfWeek = 1;

selectedDatesEl.innerText = "Загружаем свободные даты…";

loadBusyDates()
    .then((busyDates) => {
      initCalendar(busyDates);
      selectedDatesEl.innerText = "Выбери даты";
      warningEl.innerText = busyDates.length ? "" : "Занятые даты не найдены";
    })
    .catch((e) => {
      console.error(e);
      selectedDatesEl.innerText = "Выбери даты";
      warningEl.innerText = "Не удалось загрузить занятые даты";
    });

  banyaEl.addEventListener("change", updateBookingState);
  kupelEl.addEventListener("change", updateBookingState);
  guestsEl.addEventListener("change", updateBookingState);

  bookBtn.addEventListener("click", function () {
    bookBtn.classList.remove("tap-anim");
    void bookBtn.offsetWidth;
    bookBtn.classList.add("tap-anim");
  });

  bookBtn.onclick = () => {
    if (!checkin || !checkout) {
      alert("Выбери даты заезда и выезда");
      return;
    }

    if (selectedNights < minNights) {
      warningEl.innerText = "Минимальный срок бронирования — 2 ночи.";
      return;
    }

    const name = nameEl.value.trim() || "—";
    const comment = commentEl.value.trim() || "—";
    const guests = guestsEl.value;
    const total = getTotal();

    const text =
`Здравствуйте! 👋

Хочу забронировать дом в Сочи 🌲

Заезд: ${formatDate(checkin)}
Выезд: ${formatDate(checkout)}
Ночей: ${selectedNights}
Гостей: ${guests}
${banyaEl.checked ? "Баня: да (+6 000 ₽)\n" : ""}${kupelEl.checked ? "Чан: да (+4 000 ₽)\n" : ""}Стоимость: ${total.toLocaleString("ru-RU")} ₽

Имя: ${name}
Комментарий: ${comment}`;

    const url = `https://t.me/${TELEGRAM_USERNAME}?text=` + encodeURIComponent(text);
    window.open(url, "_blank");
  };
});
</script>
